<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Chat 💖</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
  background: #e5ddd5;
  height: 100vh;
  display: flex;
  justify-content: center;
}

/* APP */
.chat {
  width: 100%;
  max-width: 520px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: #efeae2;
}

/* HEADER */
.header {
  background: #075e54;
  color: white;
  padding: 12px;
}

.name { font-weight: bold; }
.status { font-size: 12px; opacity: 0.8; }

/* MESSAGES */
.messages {
  flex: 1;
  padding: 12px;
  overflow-y: auto;
}

/* BUBBLES */
.msg {
  max-width: 75%;
  padding: 10px 12px;
  border-radius: 10px;
  margin-bottom: 10px;
  font-size: 14px;
  line-height: 1.4;
  white-space: pre-wrap;
}

.them { background: white; }
.me {
  background: #dcf8c6;
  margin-left: auto;
}

/* typing bubble */
.typing {
  display: inline-flex;
  gap: 4px;
}

.dot {
  width: 6px;
  height: 6px;
  background: #666;
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}

.dot:nth-child(2){ animation-delay: 0.2s; }
.dot:nth-child(3){ animation-delay: 0.4s; }

@keyframes bounce {
  0%,80%,100% { transform: scale(0); }
  40% { transform: scale(1); }
}

/* INPUT */
.inputBox {
  display: flex;
  padding: 10px;
  background: #f0f0f0;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
  outline: none;
  font-size: 14px;
}

button {
  margin-left: 8px;
  padding: 10px 14px;
  border: none;
  border-radius: 20px;
  background: #075e54;
  color: white;
}
</style>
</head>

<body>

<div class="chat">

  <!-- HEADER -->
  <div class="header">
    <div class="name">💖 Avinash (PJC)</div>
    <div class="status">online</div>
  </div>

  <!-- CHAT -->
  <div class="messages" id="chat"></div>

  <!-- INPUT -->
  <div class="inputBox">
    <input id="reply" placeholder="Type your reply..." />
    <button onclick="send()">Send</button>
  </div>

</div>

<script>

const messages = [
  "Hey Mamta Banerjee 💖",
  "When we first met, I wasn’t sure how important you would become in my life 😄",
  "But slowly I realized something special about you...",
  "We have the same vibe, same bakchodi energy 😂",
  "And I really admire your simplicity and nature 💫",
  "Whenever I am with you, I forget all world tension and feel happy & light 😊",
  "In such a short time, we created so many funny memories 💭",
  "I don’t want this to stop here… I want this journey for life 💖",
  "I would like to elect you as the CM of my heart 👑"
];

let i = 0;
const chat = document.getElementById("chat");

function scrollDown(){
  chat.scrollTop = chat.scrollHeight;
}

/* show typing indicator */
function showTyping(cb){
  const typing = document.createElement("div");
  typing.className = "msg them";
  typing.id = "typingBox";

  typing.innerHTML = `
    <div class="typing">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  `;

  chat.appendChild(typing);
  scrollDown();

  setTimeout(()=>{
    typing.remove();
    cb();
  }, 1200);
}

/* load messages like real chat */
function loadMessages(){
  if(i < messages.length){

    showTyping(()=>{

      const div = document.createElement("div");
      div.className = "msg them";
      div.innerText = messages[i];

      chat.appendChild(div);
      scrollDown();

      i++;
      setTimeout(loadMessages, 700);

    });

  }
}

loadMessages();

/* send message */
function send(){
  const msg = document.getElementById("reply").value;
  if(!msg) return;

  const div = document.createElement("div");
  div.className = "msg me";
  div.innerHTML = `<b>Avinash (PJC)</b><br>${msg}`;

  chat.appendChild(div);
  scrollDown();

  fetch("https://formspree.io/f/maqgqvzl", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      name: "Avinash (PJC)",
      message: msg
    })
  });

  document.getElementById("reply").value = "";
}

</script>

</body>
</html>
