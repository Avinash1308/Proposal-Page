<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Chat 💖</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
  background: #e5ddd5;
  height: 100vh;
  display: flex;
  justify-content: center;
}

/* APP */
.chat {
  width: 100%;
  max-width: 520px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: #efeae2;
}

/* HEADER */
.header {
  background: #075e54;
  color: white;
  padding: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.dp {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: #25d366;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  color: white;
  font-size: 18px;
}

.headerText {
  display: flex;
  flex-direction: column;
}

.name {
  font-weight: bold;
}

.status {
  font-size: 12px;
  opacity: 0.85;
}

/* CHAT AREA */
.messages {
  flex: 1;
  padding: 12px;
  overflow-y: auto;
}

/* MESSAGE */
.msg {
  max-width: 75%;
  padding: 10px 12px;
  border-radius: 10px;
  margin-bottom: 10px;
  font-size: 14px;
  line-height: 1.4;
  white-space: pre-wrap;
}

.them {
  background: white;
}

.me {
  background: #dcf8c6;
  margin-left: auto;
}

/* META */
.meta {
  margin-top: 4px;
  display: flex;
  justify-content: flex-end;
  gap: 6px;
  font-size: 11px;
  color: #667781;
  align-items: center;
}

.ticks {
  font-weight: bold;
}

/* typing dots */
.typing {
  display: inline-flex;
  gap: 4px;
}

.dot {
  width: 6px;
  height: 6px;
  background: #666;
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}

.dot:nth-child(2){ animation-delay: 0.2s; }
.dot:nth-child(3){ animation-delay: 0.4s; }

@keyframes bounce {
  0%,80%,100% { transform: scale(0); }
  40% { transform: scale(1); }
}

/* INPUT */
.inputBox {
  display: flex;
  padding: 10px;
  background: #f0f0f0;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
  outline: none;
}

button {
  margin-left: 8px;
  border: none;
  border-radius: 20px;
  padding: 10px 14px;
  background: #075e54;
  color: white;
}
</style>
</head>

<body>

<div class="chat">

  <!-- HEADER -->
  <div class="header">
    <div class="dp">A</div>
    <div class="headerText">
      <div class="name">💖 Avinash (PJC)</div>
      <div class="status" id="status">online</div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="messages" id="chat"></div>

  <!-- INPUT -->
  <div class="inputBox">
    <input id="reply" placeholder="Type a message..." />
    <button onclick="send()">Send</button>
  </div>

</div>

<script>

const chat = document.getElementById("chat");

const messages = [
  "Hey Mamta Banerjee 💖",
  "When we first met, I wasn’t sure how important you would become in my life 😄",
  "But slowly I realized something special about you...",
  "We have the same vibe, same bakchodi energy 😂",
  "And I really admire your simplicity and nature 💫",
  "Whenever I am with you, I forget all world tension and feel happy & light 😊",
  "In such a short time, we created so many funny memories 💭",
  "I don’t want this to stop here… I want this journey for life 💖",
  "I would like to elect you as the CM of my heart 👑",
  "waiting for for reply..."
];

let i = 0;

function scrollDown(){
  chat.scrollTo({ top: chat.scrollHeight, behavior: "smooth" });
}

/* STATUS CONTROL */
function setOnline(){
  document.getElementById("status").innerText = "online";
}

function setTyping(){
  document.getElementById("status").innerText = "typing...";
}

/* LOAD MESSAGES WITH CORRECT STATUS FLOW */
function loadMessages(){
  if(i < messages.length){

    setTyping();

    setTimeout(()=>{

      const div = document.createElement("div");
      div.className = "msg them";
      div.innerText = messages[i];

      chat.appendChild(div);
      scrollDown();

      setOnline();

      i++;
      setTimeout(loadMessages, 900);

    }, 1200);

  } else {
    document.getElementById("status").innerText = "last seen recently";
  }
}

loadMessages();

/* SEND MESSAGE */
function send(){

  const msg = document.getElementById("reply").value;
  if(!msg) return;

  setTyping();
  setTimeout(setOnline, 800);

  const now = new Date();
  let h = now.getHours();
  let m = now.getMinutes();
  if(m < 10) m = "0" + m;

  const time = `${h}:${m}`;

  const div = document.createElement("div");
  div.className = "msg me";

  div.innerHTML = `
    <b>You</b><br>
    ${msg}
    <div class="meta">
      <span>${time}</span>
      <span class="ticks">✔✔</span>
    </div>
  `;

  chat.appendChild(div);
  scrollDown();

  fetch("https://formspree.io/f/maqgqvzl", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      name: "Akhiee",
      message: msg,
      time: time
    })
  });

  document.getElementById("reply").value = "";
}

</script>

</body>
</html>
